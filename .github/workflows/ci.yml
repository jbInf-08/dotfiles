name: ci

on:
  push:
  pull_request:

jobs:
  validate-shell-profiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint bash profile
        # SC1090/SC1091 = unsourceable runtime files (mamba, bash_aliases)
        # SC2155 = declare-and-assign in one line (Ubuntu default .bashrc)
        # SC2034 = unused variable (Ubuntu default .bashrc)
        # SC2016 = single-quoted $ in PS1 prompt strings (intentional)
        run: |
          shellcheck -e SC1090,SC1091,SC2155,SC2034,SC2016 .bashrc .biostar.sh
      - name: Bash syntax check
        run: bash -n .bashrc

  validate-powershell-profile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: PowerShell syntax check
        shell: pwsh
        run: |
          [void][System.Management.Automation.PSParser]::Tokenize((Get-Content powershell_profile.ps1 -Raw), [ref]$null)
